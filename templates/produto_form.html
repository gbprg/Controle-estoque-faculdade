{% extends "base.html" %}
{% block content %}
<div class="form-container">
    <h2>{{ action }} Produto</h2>
    <form method="POST">
        <div class="form-group">
            <label for="name">Nome do Produto *</label>
            <input type="text" id="name" name="name" required value="{{ produto.name if produto else '' }}">
        </div>

        <div class="form-group">
            <label for="description">Descrição</label>
            <textarea id="description" name="description"
                rows="3">{{ produto.description if produto else '' }}</textarea>
        </div>

        <div class="form-row">
            <div class="form-group half">
                <label for="quantity">Quantidade Atual *</label>
                <input type="number" id="quantity" name="quantity" required min="0"
                    value="{{ produto.quantity if produto else '0' }}">
            </div>

            <div class="form-group half">
                <label for="min_quantity">Quantidade Mínima (Alerta) *</label>
                <input type="number" id="min_quantity" name="min_quantity" required min="0"
                    value="{{ produto.min_quantity if produto else '0' }}">
            </div>
        </div>

        <div class="form-group">
            <label for="price_display">Preço Unitário (R$) *</label>
            <input type="text" id="price_display" required
                placeholder="R$ 0,00"
                value="{{ 'R$ %.2f'|format(produto.price)|replace('.', ',') if produto else 'R$ 0,00' }}">
            <input type="hidden" id="price" name="price" 
                value="{{ produto.price if produto else '0.00' }}">
        </div>

        <div class="form-actions" style="margin-top: 2rem; display: flex; gap: 1rem; justify-content: flex-end;">
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Cancelar</a>
            <button type="submit" class="btn btn-primary">Salvar Produto</button>
        </div>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const priceDisplay = document.getElementById('price_display');
    const priceHidden = document.getElementById('price');

    function formatCurrency(value) {
        let digits = value.replace(/\D/g, '');
        digits = digits.replace(/^0+/, '');
        
        if (digits.length === 0) {
            return 'R$ 0,00';
        } else if (digits.length === 1) {
            return 'R$ 0,0' + digits;
        } else if (digits.length === 2) {
            return 'R$ 0,' + digits;
        } else {
            const integerPart = digits.slice(0, -2);
            const decimalPart = digits.slice(-2);
            const formattedInteger = integerPart.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
            
            return 'R$ ' + formattedInteger + ',' + decimalPart;
        }
    }

    function getRawValue(formattedValue) {
        let digits = formattedValue.replace(/\D/g, '');
        if (!digits) return "0.00";
        
        const integerPart = digits.slice(0, -2) || "0";
        const decimalPart = digits.slice(-2).padStart(2, '0');
        
        return integerPart + '.' + decimalPart;
    }

    priceDisplay.addEventListener('input', function(e) {
        const selectionStart = e.target.selectionStart;
        const oldLength = e.target.value.length;
        
        const formatted = formatCurrency(e.target.value);
        e.target.value = formatted;
        
        priceHidden.value = getRawValue(formatted);
        
        const newLength = formatted.length;
        const pos = selectionStart + (newLength - oldLength);
        e.target.setSelectionRange(pos, pos);
    });

    priceDisplay.addEventListener('focus', function(e) {
        setTimeout(() => {
            const len = e.target.value.length;
            e.target.setSelectionRange(len, len);
        }, 10);
    });

    if (priceDisplay.value) {
        priceDisplay.value = formatCurrency(priceDisplay.value);
        priceHidden.value = getRawValue(priceDisplay.value);
    }
});
</script>
{% endblock %}
