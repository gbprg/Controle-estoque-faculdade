{% extends "base.html" %}
{% block content %}
<div class="form-container">
    <h2>Cadastrar Novo Usuário</h2>
    <p class="subtitle">Apenas administradores podem realizar esta ação.</p>

    <form method="POST" action="{{ url_for('cadastrar_usuario') }}">
        <div class="form-group">
            <label for="username">Nome de Usuário *</label>
            <input type="text" id="username" name="username" required autocomplete="off">
        </div>

        <div class="form-group">
            <label for="password">Senha *</label>
            <input type="password" id="password" name="password" required>
        </div>

        <div class="form-group">
            <label for="role">Perfil de Acesso *</label>
            <select id="role" name="role" required>
                <option value="comum">Comum (Apenas gerenciar estoque)</option>
                <option value="admin">Administrador (Acesso total)</option>
            </select>
        </div>

        <div class="form-actions" style="margin-top: 2rem; display: flex; gap: 1rem; justify-content: flex-end;">
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Cancelar</a>
            <button type="submit" class="btn btn-primary">Cadastrar</button>
        </div>
    </form>
</div>
{% endblock %}
